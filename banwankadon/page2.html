<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ช่องทางการติดต่อ</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#33CCFF,#3366FF,#3300CC);
}

/* ปุ่มสามขีด */
#menuBtn{
    position:fixed;
    top:20px;
    left:20px;
    font-size:35px;
    color:white;
    cursor:pointer;
    background:rgba(0,0,0,.35);
    padding:10px 15px;
    border-radius:10px;
    z-index:1001;
    transition:.3s;
}

#menuBtn:hover{
    background:#3366FF;
}

/* เมนู */
#sidebar{
    position:fixed;
    top:0;
    left:-270px;
    width:250px;
    height:100%;
    background:linear-gradient(180deg,#1b3cff,#4d6cff,#7f4dff);
    transition:.35s;
    box-shadow:5px 0 15px rgba(0,0,0,.4);
    padding-top:80px;
    z-index:1000;
}

#sidebar.active{
    left:0;
}

#sidebar h2{
    color:white;
    text-align:center;
}

#sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:18px 25px;
    font-size:22px;
    transition:.3s;
}

#sidebar a:hover{
    background:white;
    color:#3366FF;
    padding-left:40px;
}

/* หัวข้อ */
h1{
    color:white;
    text-align:center;
    margin-top:40px;
}

/* การ์ด */
.card{
    width:380px;
    margin:30px auto;
    background:white;
    border-radius:15px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.35);
}

.logo{
    width:120px;
    height:120px;
}

.name{
    font-size:28px;
    font-weight:bold;
    margin:15px;
}

button{
    width:250px;
    height:50px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#3366FF;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#264de4;
}
</style>
</head>

<body>

<!-- ปุ่มสามขีด -->
<div id="menuBtn" onclick="toggleMenu()">☰</div>

<!-- เมนู -->
<div id="sidebar">
    <h2>📚 เมนู</h2>

    <a href="index.html">🏠 หน้าแรก</a>
    <a href="page1.html">📰 ข่าวสาร</a>
    <a href="page2.html">📷 รูปภาพ</a>
    <a href="page3.html">📞 ช่องทางการติดต่อ</a>
</div>

<h1>📱 ช่องทางการติดต่อ</h1>

<div class="card">
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/a/a9/TikTok_logo.svg">

    <div class="name">TikTok</div>

    <button onclick="window.open('https://www.tiktok.com/@ชื่อบัญชี','_blank')">
        ไปที่ TikTok
    </button>
</div>

<div class="card">
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg">

    <div class="name">Facebook Page</div>

    <button onclick="window.open('https://www.facebook.com/117NSN?','_blank')">
        ไปที่เพจ
    </button>
</div>

<script>
function toggleMenu(){
    document.getElementById("sidebar").classList.toggle("active");
}

document.addEventListener("click",function(e){
    const sidebar=document.getElementById("sidebar");
    const btn=document.getElementById("menuBtn");

    if(!sidebar.contains(e.target) && !btn.contains(e.target)){
        sidebar.classList.remove("active");
    }
});
</script>

</body>
</html>
</body>
</html>
